<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      background-color: #333;
    }
    body {
      height: 100%;
      background-color: #333;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 10px;
      color: #aaa;
    }
    h1 {
      font-size: 42px;
      margin: 0;
    }
    p {
      font-size: 21px;
      text-align: center;
      line-height: 1.4em;
    }
    strong {
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>MOTUS</h1>
  <p>
    A Chrome comsole tiny game in one line of JS.<br/>
    <strong>Open the console.</strong>
  </p>
  <script src="./Motus.js"></script>
  <script>
    const codeStyle = 'color: #88f; background-color: #000; padding: 4px;';

    (logFn => ({ log(...args) { return logFn(...args) && this } }))((...args) => console.log(...args) || true)
      .log('%cHOW TO PLAY', 'font-size: 1.5em')
      .log(`Tap %cmotus.play()%c to start a game.`, codeStyle, '')
      .log('')
      .log(`You can add parameters to the play() method`)
      .log(`- First param is the secret word to find.`)
      .log(`- Second param is the max count of try until the player loose.`)
      .log('')
      .log(`Example: %cmotus.play('mysterious', 10)%c`, codeStyle, '')
      .log('')
      .log('');
  </script>
</body>
</html>
